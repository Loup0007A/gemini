<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Mon Chat Gemini</title>
  <style>
    :root {
      --bg-color: #f2f2f7;
      --card-bg: #ffffff;
      --user-msg: #007aff;
      --ai-msg: #e5e5ea;
      --text-color: #000000;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: -webkit-fill-available;
      overflow: hidden;
    }

    header {
      background: var(--card-bg);
      padding: 12px 16px;
      text-align: center;
      border-bottom: 1px solid #c6c6c8;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      font-size: 17px;
      font-weight: 600;
    }

    .key-btn {
      background: none;
      border: none;
      color: #007aff;
      font-size: 14px;
      cursor: pointer;
    }

    #chat-box {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.4;
      word-wrap: break-word;
    }

    .message.user {
      align-self: flex-end;
      background-color: var(--user-msg);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message.ai {
      align-self: flex-start;
      background-color: var(--ai-msg);
      color: black;
      border-bottom-left-radius: 4px;
    }

    .message.system {
      align-self: center;
      background: transparent;
      color: #8e8e93;
      font-size: 13px;
    }

    footer {
      background: var(--card-bg);
      padding: 10px 12px 24px 12px;
      border-top: 1px solid #c6c6c8;
      display: flex;
      gap: 8px;
    }

    textarea {
      flex: 1;
      border: 1px solid #c6c6c8;
      border-radius: 20px;
      padding: 8px 14px;
      font-size: 15px;
      outline: none;
      resize: none;
      height: 38px;
      max-height: 100px;
      font-family: inherit;
    }

    button#send-btn {
      background-color: #007aff;
      color: white;
      border: none;
      border-radius: 50%;
      width: 38px;
      height: 38px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    button#send-btn:disabled {
      background-color: #b0c4de;
    }
  </style>
</head>
<body>

  <header>
    <h1>Gemini Flash</h1>
    <button class="key-btn" onclick="setApiKey()">Clé API</button>
  </header>

  <div id="chat-box">
    <div class="message system">Pose une question pour démarrer.</div>
  </div>

  <footer>
    <textarea id="user-input" placeholder="Écris ton message..." rows="1"></textarea>
    <button id="send-btn" onclick="sendMessage()">➔</button>
  </footer>

  <script>
    const CHAT_BOX = document.getElementById('chat-box');
    const INPUT = document.getElementById('user-input');
    const SEND_BTN = document.getElementById('send-btn');

    // Récupérer ou demander la clé API
    function getApiKey() {
      let key = localStorage.getItem('gemini_api_key');
      if (!key) {
        key = prompt("Entre ta clé API Google AI Studio :");
        if (key) {
          localStorage.setItem('gemini_api_key', key.trim());
        }
      }
      return key;
    }

    function setApiKey() {
      const currentKey = localStorage.getItem('gemini_api_key') || "";
      const newKey = prompt("Renseigne ta clé API :", currentKey);
      if (newKey !== null) {
        localStorage.setItem('gemini_api_key', newKey.trim());
      }
    }

    // Ajustement automatique de la hauteur du champ texte
    INPUT.addEventListener('input', () => {
      INPUT.style.height = 'auto';
      INPUT.style.height = Math.min(INPUT.scrollHeight, 100) + 'px';
    });

    // Envoi avec Touche Entrée (sans Shift)
    INPUT.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    async function sendMessage() {
      const promptText = INPUT.value.trim();
      if (!promptText) return;

      const apiKey = getApiKey();
      if (!apiKey) {
        alert("Une clé API est requise pour continuer.");
        return;
      }

      // Ajouter le message utilisateur
      appendMessage(promptText, 'user');
      INPUT.value = '';
      INPUT.style.height = '38px';
      SEND_BTN.disabled = true;

      // Message temporaire de chargement
      const loadingMsg = appendMessage("L'IA réfléchit...", 'ai');

      try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            contents: [{
              parts: [{ text: promptText }]
            }]
          })
        });

        const data = await response.json();

        if (data.error) {
          loadingMsg.textContent = "Erreur : " + data.error.message;
        } else {
          const aiReply = data.candidates?.[0]?.content?.parts?.[0]?.text || "Pas de réponse reçue.";
          loadingMsg.textContent = aiReply;
        }
      } catch (err) {
        loadingMsg.textContent = "Erreur de connexion avec l'API.";
      } finally {
        SEND_BTN.disabled = false;
        scrollToBottom();
      }
    }

    function appendMessage(text, type) {
      const msgDiv = document.createElement('div');
      msgDiv.classList.add('message', type);
      msgDiv.textContent = text;
      CHAT_BOX.appendChild(msgDiv);
      scrollToBottom();
      return msgDiv;
    }

    function scrollToBottom() {
      CHAT_BOX.scrollTop = CHAT_BOX.scrollHeight;
    }
  </script>
</body>
</html>
